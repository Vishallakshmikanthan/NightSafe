services:
  - type: web
    name: nightsafe-api
    runtime: python
    plan: free
    buildCommand: pip install -r backend/requirements.txt -r ml/requirements.txt
    startCommand: cd backend && uvicorn app.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - key: PYTHON_VERSION
        value: "3.11.9"
      - key: FRONTEND_URL
        sync: false
      - key: SECRET_KEY
        generateValue: true
